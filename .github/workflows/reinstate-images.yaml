on:
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: true
        description: If true, just log

permissions: {}


jobs:
  reinstate:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: chainguard-dev/setup-chainctl@2cddd35a2f120d9973e58094dc6878c93cf58c28 # v0.5.1
        with:
          identity: 720909c9f5279097d847ad02a2f24ba8f59de36a/b6461e99e132298f

      - uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7
      - name: Reinstate images
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -x
          while IFS= read -r img; do
            tag_ref="${img%@*}"                    # e.g. cgr.dev/chainguard/foo:latest
            tag="${tag_ref##*:}"                   # e.g. latest
            digest_ref="${tag_ref%:*}@${img#*@}"   # e.g. cgr.dev/chainguard/foo@sha256:...
            # Note: if "crane digest" passes, do not attempt to retag it
            if [[ "$DRY_RUN" == "false" ]]; then
              crane digest "$tag_ref" || crane tag "$digest_ref" "$tag" || true
            else
              echo "DRY RUN: crane digest \"$tag_ref\" || crane tag \"$digest_ref\" \"$tag\" || true"
            fi
          done < <(grep -v '\#' reinstated-images.txt)
