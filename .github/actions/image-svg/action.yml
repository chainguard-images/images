name: image-svg
inputs:
  gcsBucketName:
    default: ''
runs:
  using: composite
  steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8 # v3.1.0

    - id: gcsauth1
      if: inputs.gcsBucketName != ''
      uses: google-github-actions/auth@ef5d53e30bbcd8d0836f4288f5e50ff3e086997d # v1.0.0
      with:
        workload_identity_provider: ${{ inputs.gcsAuthWorkloadIdentityProvider }}
        service_account: ${{ inputs.gcsAuthServiceAccount }}
    - id: gcsauth2
      if: inputs.gcsBucketName != ''
      uses: google-github-actions/setup-gcloud@d51b5346f85640ec2aa2fa057354d2b82c2fcbce # v1.0.1
      with:
        project_id: ${{ inputs.gcsAuthProjectId }}
        install_components: beta

    - id: create-image-svg
      shell: bash
      run: |
        rm -rf image-svgs-output/
        mkdir image-svgs-output/

    - id: gcsupload1
      if: inputs.gcsBucketName != ''
      shell: bash
      run: |
        gsutil rsync image-svgs-output/ gs://${{ inputs.gcsBucketName }}/image-svgs

    - uses: actions/upload-artifact@83fd05a356d7e2593de66fc9913b3002723633cb # v3.1.1
      if: always()
      with:
        name: image-svgs
        path: image-svgs-output

    - name: Touch actions file to prevent postrun failure
      if: always()
      shell: bash
      run: |
        set -x && [[ -f .github/actions/image-svg/action.yml ]] || ( \
          mkdir -p .github/actions/image-svg/ && echo 'runs: {using: composite, steps: []}' > .github/actions/image-svg/action.yml )
