rules:
  # adjust the default cooldown for non-security dependabot updates
  # to 3 days, down from 7.
  dependabot-cooldown:
    config:
      days: 3
  # Cosmetic pedantic-only findings — suppressed across the campaign.
  anonymous-definition:
    disable: true
  undocumented-permissions:
    disable: true
  concurrency-limits:
    disable: true
